<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Плейлист</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Все стили оставлены как в последней версии, без изменений */
        .playlist-page { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
        .playlist-header { display: flex; gap: 32px; margin-bottom: 48px; }
        .playlist-cover { width: 250px; height: 250px; border-radius: var(--radius-lg); background: var(--bg-card); object-fit: cover; flex-shrink: 0; }
        .playlist-info { flex: 1; }
        .playlist-type { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .playlist-name { font-size: 32px; font-weight: 600; margin-bottom: 12px; }
        .playlist-owner { font-size: 16px; color: var(--accent); margin-bottom: 16px; }
        .playlist-meta { display: flex; gap: 24px; color: var(--text-secondary); margin-bottom: 24px; }
        .playlist-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .section-title { font-size: 24px; font-weight: 500; margin-bottom: 16px; }
        .tracks-list { background: var(--bg-card); border-radius: var(--radius-lg); padding: 8px 0; margin-bottom: 48px; }
        .track-item { display: flex; align-items: center; padding: 12px 16px; transition: background 0.2s; cursor: pointer; }
        .track-item:hover { background: rgba(138, 92, 255, 0.08); }
        .track-item.dragging { opacity: 0.5; }
        .track-index { width: 32px; color: var(--text-secondary); font-size: 14px; }
        .track-info { flex: 1; }
        .track-name { font-weight: 500; color: var(--text-primary); }
        .track-artists { font-size: 14px; color: var(--text-secondary); }
        .track-duration { color: var(--text-secondary); margin-left: 16px; font-size: 14px; }
        .track-play-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; transition: var(--transition); margin-left: 8px; }
        .track-play-btn:hover { color: var(--accent); background: rgba(138,92,255,0.1); }
        .track-remove-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; transition: var(--transition); margin-left: 4px; display: none; }
        .track-remove-btn:hover { color: #ff5c5c; background: rgba(255,92,92,0.1); }
        .edit-controls { margin-top: 16px; display: none; }
        .rename-form, .privacy-form, .collaborators-section { margin-bottom: 12px; }
        .rename-form input, .add-track-form input, .collab-search input { background: var(--bg-deep); border: 1px solid transparent; border-radius: var(--radius-md); padding: 10px 14px; color: var(--text-primary); font-size: 16px; outline: none; flex: 1; transition: border-color 0.2s; }
        .rename-form input:focus, .add-track-form input:focus, .collab-search input:focus { border-color: var(--accent); }
        .search-track-wrapper, .collab-search { position: relative; flex: 1; }
        .search-track-dropdown, .collab-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--bg-card); border-radius: var(--radius-lg); padding: 4px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1001; max-height: 200px; overflow-y: auto; }
        .delete-playlist-btn { color: #ff5c5c; margin-top: 8px; }
        .collab-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .collab-tag { background: var(--bg-card); padding: 4px 12px; border-radius: 20px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .collab-tag button { background: none; border: none; color: var(--text-secondary); cursor: pointer; }
        .collab-tag button:hover { color: #ff5c5c; }
        .wave-results { margin-top: 48px; }
        .wave-list { background: var(--bg-card); border-radius: var(--radius-lg); padding: 8px 0; }
        .wave-item { display: flex; align-items: center; padding: 12px 16px; transition: background 0.2s; cursor: pointer; }
        .wave-item:hover { background: rgba(138,92,255,0.08); }
        .wave-index { font-family: var(--font-mono); font-size: 20px; color: var(--accent); min-width: 80px; margin-right: 16px; }
        .wave-info { flex: 1; }
        .wave-track-name { font-weight: 500; color: var(--text-primary); }
        .wave-track-artists { font-size: 14px; color: var(--text-secondary); }
        .wave-play-btn { background: none; border: none; color: var(--text-secondary); font-size: 18px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .wave-play-btn:hover { color: var(--accent); background: rgba(138,92,255,0.1); }
        .empty-message { text-align: center; padding: 40px; color: var(--text-secondary); }
        .error-message { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">U<span style="color: var(--accent);">:</span>V</a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>
    <main class="playlist-page">
        <div id="playlist-content"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </main>
    <div id="player-bar" class="player-bar" style="display: none;"></div>
    <script>(function createPlayerDOM() {
        const bar = document.getElementById('player-bar');
        bar.innerHTML = `<img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover"><div class="player-info"><div id="player-track-name" class="player-track-link">Не выбран трек</div><div id="player-artist-name" class="player-artist-name"></div></div><div class="player-controls"><button id="player-play" class="player-btn">▶</button><button id="player-next" class="player-btn">⏭</button></div><div class="player-progress-container"><span id="player-current-time" class="player-time">0:00</` + `span><input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0"><span id="player-duration" class="player-time">0:00</span></div><div class="player-actions"><button id="player-like" class="player-btn">❤️</button><button id="player-wave" class="player-btn">🌊</button><button id="player-expand" class="player-btn">⤢</button></div>`;
    })();</script>
    <style>.player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 180px; background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 32px; display: flex; align-items: center; gap: 24px; z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); } .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; } .player-info { flex: 1; min-width: 200px; } .player-track-name { font-size: 18px; font-weight: 500; } .player-artist-name { font-size: 14px; color: var(--text-secondary); } .player-controls { display: flex; align-items: center; gap: 16px; } .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; } .player-progress { flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px; -webkit-appearance: none; appearance: none; } .player-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; } .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; } .player-actions { display: flex; gap: 16px; margin-left: auto; } .player-btn { background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: var(--transition); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; } .player-btn:hover { color: var(--accent); background: rgba(138,92,255,0.1); } .player-btn.liked { color: var(--accent); }</style>
    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { player } from './js/player.js';
        import { api } from './js/api.js';
        import { formatTime, generateCoverPlaceholder, debounce } from './js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const playlistId = params.get('id');
        const contentDiv = document.getElementById('playlist-content');
        const errorDiv = document.getElementById('error-message');

        let currentPlaylist = null;
        let isOwner = false;
        let isCollaborator = false;
        let editing = false;

        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                    return user;
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
            return null;
        }

        async function loadPlaylist() {
            if (!playlistId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Не указан ID плейлиста';
                return;
            }
            try {
                const playlist = await api.get(`/playlists/${playlistId}`);
                currentPlaylist = playlist;
                const user = isAuthenticated() ? await getCurrentUser() : null;
                if (user) {
                    if (playlist.owner && user.id === playlist.owner.id) {
                        isOwner = true;
                        isCollaborator = true;
                    } else if (playlist.collaborators && playlist.collaborators.some(c => c.id === user.id)) {
                        isCollaborator = true;
                    }
                }
                let isLiked = false;
                if (isAuthenticated()) {
                    try {
                        const data = await api.get('/users/me/favorites/playlist-ids');
                        if (data && data.playlist_ids) {
                            isLiked = data.playlist_ids.some(id => id === playlistId);
                        }
                    } catch (e) {}
                }
                renderPlaylist(playlist, isLiked);
            } catch (e) {
                console.error(e);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Плейлист не найден';
            }
        }

        function renderPlaylist(playlist, isLiked = false) {
            const coverSrc = generateCoverPlaceholder(`${playlist.name}${playlist.id}`, 250);
            const ownerName = playlist.owner?.username || 'Неизвестный';
            const tracks = playlist.tracks || [];
            const totalDuration = tracks.reduce((sum, t) => sum + (t.duration || 0), 0);
            const likeBtnText = isLiked ? '❤️ Убрать лайк' : '❤️ Нравится';
            const isPublicText = playlist.is_public ? 'Публичный' : 'Приватный';

            let html = `
                <div class="playlist-header">
                    <img class="playlist-cover" src="${coverSrc}" alt="${playlist.name}">
                    <div class="playlist-info">
                        <div class="playlist-type">${isPublicText} плейлист</div>
                        <h1 class="playlist-name" id="playlist-name-display">${playlist.name}</h1>
                        <div class="playlist-owner">${ownerName}</div>
                        <div class="playlist-meta">
                            <span>⏱ ${formatTime(totalDuration)}</span>
                            <span>🎵 <span id="track-count">${tracks.length}</span> треков</span>
                            <span id="playlist-likes">❤️ ${playlist.likes}</span>
                        </div>
                        <div class="playlist-actions">
                            <button class="btn btn-accent" id="play-all-btn">▶ Воспроизвести всё</button>
                            <button class="btn" id="like-playlist-btn">${likeBtnText}</button>
                            <button class="btn" id="wave-playlist-btn">🌊 Волна плейлиста</button>
                            ${isCollaborator ? '<button class="btn" id="edit-toggle-btn">✎ Редактировать</button>' : ''}
                        </div>
                        ${isCollaborator ? `
                        <div class="edit-controls" id="edit-controls" style="display: none;">
                            ${isOwner ? `
                            <div class="rename-form">
                                <input type="text" id="rename-input" placeholder="Новое название" value="${playlist.name}">
                                <button class="btn" id="rename-btn">Переименовать</button>
                            </div>
                            <div class="privacy-form">
                                <button class="btn" id="toggle-privacy-btn">Сделать ${playlist.is_public ? 'приватным' : 'публичным'}</button>
                            </div>
                            <div class="collaborators-section">
                                <strong style="color: var(--text-secondary);">Коллабораторы</strong>
                                <div class="collab-list" id="collab-list">
                                    ${playlist.collaborators?.map(c => 
                                        `<span class="collab-tag">${c.username} <button data-user-id="${c.id}" class="remove-collab-btn">✕</button></span>`
                                    ).join('') || ''}
                                </div>
                                <div class="collab-search" style="display: flex; gap: 8px;">
                                    <input type="text" id="collab-search-input" placeholder="Имя пользователя...">
                                    <button class="btn" id="add-collab-btn">Добавить</button>
                                    <div class="collab-dropdown" id="collab-dropdown" style="display: none;"></div>
                                </div>
                            </div>
                            ` : ''}
                            <div class="add-track-form" style="display: flex; gap: 8px; margin-top: 12px;">
                                <div class="search-track-wrapper">
                                    <input type="text" id="search-track-input" placeholder="Поиск трека по названию...">
                                    <div class="search-track-dropdown" id="track-search-dropdown" style="display: none;"></div>
                                </div>
                                <button class="btn btn-accent" id="add-selected-track-btn">Добавить</button>
                            </div>
                            ${isOwner ? '<button class="btn delete-playlist-btn" id="delete-playlist-btn">🗑 Удалить плейлист</button>' : ''}
                        </div>` : ''}
                    </div>
                </div>
            `;

            if (tracks.length) {
                html += '<h2 class="section-title">Треки</h2><div class="tracks-list" id="tracks-container">';
                tracks.forEach((track, idx) => {
                    const duration = formatTime(track.duration);
                    html += `
                        <div class="track-item" draggable="${isCollaborator}" data-id="${track.id}" data-idx="${idx}">
                            <div class="track-index">${idx + 1}</div>
                            <div class="track-info">
                                <div class="track-name">${track.name}</div>
                                <div class="track-artists"></div>
                            </div>
                            <div class="track-duration">${duration}</div>
                            <button class="track-play-btn" title="Воспроизвести">▶</button>
                            ${isCollaborator ? '<button class="track-remove-btn" title="Удалить">✕</button>' : ''}
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="empty-message" id="empty-placeholder">В этом плейлисте пока нет треков</div>';
            }

            html += `
                <div id="wave-section" class="wave-results" style="display: none;">
                    <h2 class="section-title">🌊 Волна плейлиста</h2>
                    <div class="wave-list" id="wave-list"></div>
                    <div id="wave-loading" class="empty-message" style="display: none;">Поиск совпадений…</div>
                    <div id="wave-error" class="empty-message" style="display: none;">Не удалось загрузить рекомендации</div>
                </div>
            `;

            contentDiv.innerHTML = html;
            attachPlaylistEvents(playlist);
        }

        function attachPlaylistEvents(playlist) {
            const playAllBtn = document.getElementById('play-all-btn');
            if (playAllBtn && playlist.tracks.length) {
                playAllBtn.addEventListener('click', () => player.loadTrack(playlist.tracks[0].id));
            }

            document.querySelectorAll('.track-item').forEach(item => {
                const playBtn = item.querySelector('.track-play-btn');
                const trackId = item.dataset.id;
                item.addEventListener('click', (e) => {
                    if (e.target === playBtn || playBtn.contains(e.target)) return;
                    window.location.href = `/frontend/track.html?id=${trackId}`;
                });
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.loadTrack(trackId);
                });
            });

            const likeBtn = document.getElementById('like-playlist-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', async () => {
                    const likesSpan = document.getElementById('playlist-likes');
                    try {
                        await api.post(`/playlists/${playlist.id}/like`);
                        likeBtn.textContent = '❤️ Убрать лайк';
                        likesSpan.textContent = `❤️ ${playlist.likes + 1}`;
                    } catch (e) {
                        if (e.message.includes('already')) {
                            await api.delete(`/playlists/${playlist.id}/like`);
                            likeBtn.textContent = '❤️ Нравится';
                            likesSpan.textContent = `❤️ ${Math.max(0, playlist.likes - 1)}`;
                        }
                    }
                });
            }

            const waveBtn = document.getElementById('wave-playlist-btn');
            if (waveBtn) waveBtn.addEventListener('click', () => loadWave(playlist.id));

            if (!isCollaborator) return;

            const editToggleBtn = document.getElementById('edit-toggle-btn');
            const editControls = document.getElementById('edit-controls');
            const removeButtons = document.querySelectorAll('.track-remove-btn');
            const tracksContainer = document.getElementById('tracks-container');

            editToggleBtn.addEventListener('click', () => {
                editing = !editing;
                editControls.style.display = editing ? 'block' : 'none';
                removeButtons.forEach(btn => btn.style.display = editing ? 'inline-block' : 'none');
                editToggleBtn.textContent = editing ? '✓ Готово' : '✎ Редактировать';
                document.querySelectorAll('.track-item').forEach(item => item.draggable = editing);
            });

            if (isOwner) {
                document.getElementById('rename-btn').addEventListener('click', async () => {
                    const newName = document.getElementById('rename-input').value.trim();
                    if (!newName) return alert('Введите название');
                    await api.patch(`/playlists/${playlist.id}`, { name: newName });
                    document.getElementById('playlist-name-display').textContent = newName;
                });

                document.getElementById('toggle-privacy-btn').addEventListener('click', async () => {
                    const newPublic = !playlist.is_public;
                    await api.patch(`/playlists/${playlist.id}`, { is_public: newPublic });
                    playlist.is_public = newPublic;
                    document.getElementById('toggle-privacy-btn').textContent = `Сделать ${newPublic ? 'приватным' : 'публичным'}`;
                });

                const collabSearchInput = document.getElementById('collab-search-input');
                const collabDropdown = document.getElementById('collab-dropdown');
                let selectedUserId = null;

                const searchUsers = debounce(async (query) => {
                    if (!query) { collabDropdown.style.display = 'none'; return; }
                    try {
                        const users = await api.get(`/users?q=${encodeURIComponent(query)}`);
                        if (!users.length) {
                            collabDropdown.innerHTML = '<div class="dropdown-item" style="cursor: default;">Не найдено</div>';
                        } else {
                            collabDropdown.innerHTML = users.slice(0, 5).map(u =>
                                `<div class="dropdown-item" data-user-id="${u.id}">${u.username}</div>`
                            ).join('');
                        }
                        collabDropdown.style.display = 'block';
                    } catch (e) { console.error(e); }
                }, 300);

                collabSearchInput.addEventListener('input', () => searchUsers(collabSearchInput.value.trim()));
                document.addEventListener('click', (e) => {
                    if (!collabSearchInput.contains(e.target) && !collabDropdown.contains(e.target)) {
                        collabDropdown.style.display = 'none';
                    }
                });

                collabDropdown.addEventListener('click', (e) => {
                    const item = e.target.closest('.dropdown-item');
                    if (!item) return;
                    selectedUserId = item.dataset.userId;
                    collabSearchInput.value = item.textContent;
                    collabDropdown.style.display = 'none';
                });

                document.getElementById('add-collab-btn').addEventListener('click', async () => {
                    if (!selectedUserId) return alert('Выберите пользователя');
                    await api.post(`/playlists/${playlist.id}/collaborators`, { user_id: selectedUserId });
                    window.location.reload();
                });

                document.getElementById('collab-list').addEventListener('click', async (e) => {
                    const removeBtn = e.target.closest('.remove-collab-btn');
                    if (!removeBtn) return;
                    const userId = removeBtn.dataset.userId;
                    await api.delete(`/playlists/${playlist.id}/collaborators/${userId}`);
                    window.location.reload();
                });

                document.getElementById('delete-playlist-btn').addEventListener('click', async () => {
                    if (confirm('Удалить плейлист навсегда?')) {
                        await api.delete(`/playlists/${playlist.id}`);
                        window.location.href = '/frontend/index.html';
                    }
                });
            }

            const searchTrackInput = document.getElementById('search-track-input');
            const trackDropdown = document.getElementById('track-search-dropdown');
            let selectedTrackId = null;

            const performTrackSearch = debounce(async (query) => {
                if (!query) { trackDropdown.style.display = 'none'; return; }
                try {
                    const tracks = await api.get(`/tracks?q=${encodeURIComponent(query)}`);
                    if (!tracks.length) {
                        trackDropdown.innerHTML = '<div class="dropdown-item" style="cursor: default;">Ничего не найдено</div>';
                    } else {
                        trackDropdown.innerHTML = tracks.slice(0, 5).map(t =>
                            `<div class="dropdown-item" data-track-id="${t.id}">${t.name} — ${t.artists?.map(a => a.name).join(', ')}</div>`
                        ).join('');
                    }
                    trackDropdown.style.display = 'block';
                } catch (e) { console.error(e); }
            }, 300);

            searchTrackInput.addEventListener('input', () => performTrackSearch(searchTrackInput.value.trim()));
            document.addEventListener('click', (e) => {
                if (!searchTrackInput.contains(e.target) && !trackDropdown.contains(e.target)) {
                    trackDropdown.style.display = 'none';
                }
            });

            trackDropdown.addEventListener('click', (e) => {
                const item = e.target.closest('.dropdown-item');
                if (!item) return;
                selectedTrackId = item.dataset.trackId;
                searchTrackInput.value = item.textContent.split(' — ')[0];
                trackDropdown.style.display = 'none';
            });

            document.getElementById('add-selected-track-btn').addEventListener('click', async () => {
                if (!selectedTrackId) return alert('Выберите трек');
                await api.post(`/playlists/${playlist.id}/tracks`, { track_id: selectedTrackId });
                window.location.reload();
            });

            document.addEventListener('click', async (e) => {
                if (!editing) return;
                const removeBtn = e.target.closest('.track-remove-btn');
                if (!removeBtn) return;
                e.stopPropagation();
                const trackItem = removeBtn.closest('.track-item');
                await api.delete(`/playlists/${playlist.id}/tracks/${trackItem.dataset.id}`);
                trackItem.remove();
                const remaining = document.querySelectorAll('.track-item');
                document.getElementById('track-count').textContent = remaining.length;
                remaining.forEach((item, idx) => {
                    item.querySelector('.track-index').textContent = idx + 1;
                    item.dataset.idx = idx;
                });
                if (!remaining.length) {
                    const container = document.getElementById('tracks-container');
                    if (container) container.innerHTML = '<div class="empty-message">В этом плейлисте пока нет треков</div>';
                }
            });

            if (tracksContainer) {
                tracksContainer.addEventListener('dragstart', (e) => {
                    const item = e.target.closest('.track-item');
                    if (!editing || !item) return;
                    e.dataTransfer.setData('text/plain', item.dataset.id);
                    setTimeout(() => item.classList.add('dragging'), 0);
                });
                tracksContainer.addEventListener('dragend', (e) => {
                    const item = e.target.closest('.track-item');
                    if (item) item.classList.remove('dragging');
                });
                tracksContainer.addEventListener('dragover', e => e.preventDefault());
                tracksContainer.addEventListener('drop', async (e) => {
                    e.preventDefault();
                    if (!editing) return;
                    const draggedId = e.dataTransfer.getData('text/plain');
                    const target = e.target.closest('.track-item');
                    if (!target || draggedId === target.dataset.id) return;
                    const items = [...tracksContainer.querySelectorAll('.track-item')];
                    const draggedItem = items.find(i => i.dataset.id === draggedId);
                    const targetItem = items.find(i => i.dataset.id === target.dataset.id);
                    if (!draggedItem || !targetItem) return;
                    const draggedIdx = items.indexOf(draggedItem);
                    const targetIdx = items.indexOf(targetItem);
                    if (draggedIdx < targetIdx) {
                        tracksContainer.insertBefore(draggedItem, targetItem.nextSibling);
                    } else {
                        tracksContainer.insertBefore(draggedItem, targetItem);
                    }
                    const newItems = [...tracksContainer.querySelectorAll('.track-item')];
                    newItems.forEach((item, idx) => {
                        item.querySelector('.track-index').textContent = idx + 1;
                        item.dataset.idx = idx;
                    });
                    const newOrder = newItems.map(item => item.dataset.id);
                    await api.post(`/playlists/${playlist.id}/tracks/reorder`, newOrder);
                });
            }
        }

        async function loadWave(playlistId) {
            const waveSection = document.getElementById('wave-section');
            const waveList = document.getElementById('wave-list');
            const waveLoading = document.getElementById('wave-loading');
            const waveError = document.getElementById('wave-error');

            waveSection.style.display = 'block';
            waveList.innerHTML = '';
            waveLoading.style.display = 'block';
            waveError.style.display = 'none';

            try {
                const similar = await api.post(`/playlists/${playlistId}/wave`, { limit: 20 });
                waveLoading.style.display = 'none';
                if (!similar.length) {
                    waveList.innerHTML = '<div class="empty-message">Совпадений не найдено</div>';
                    return;
                }
                waveList.innerHTML = similar.map(t => {
                    const artistsStr = (t.artists || []).map(a => a.name).join(', ');
                    const uv = t.similarity ? Math.round(t.similarity) : '—';
                    return `
                        <div class="wave-item" data-id="${t.id}">
                            <div class="wave-index">UV ${uv}</div>
                            <div class="wave-info">
                                <div class="wave-track-name">${t.name}</div>
                                <div class="wave-track-artists">${artistsStr}</div>
                            </div>
                            <button class="wave-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.wave-item').forEach(item => {
                    const playBtn = item.querySelector('.wave-play-btn');
                    const trackId = item.dataset.id;
                    item.addEventListener('click', (e) => {
                        if (e.target === playBtn || playBtn.contains(e.target)) return;
                        window.location.href = `/frontend/track.html?id=${trackId}`;
                    });
                    playBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        player.loadTrack(trackId);
                    });
                });
            } catch (e) {
                console.error(e);
                waveLoading.style.display = 'none';
                waveError.style.display = 'block';
            }
        }

        updateHeader();
        loadPlaylist();
    </script>
</body>
</html>
