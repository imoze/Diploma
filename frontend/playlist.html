<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Плейлист</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .playlist-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .playlist-header {
            display: flex;
            gap: 32px;
            margin-bottom: 48px;
        }
        .playlist-cover {
            width: 250px;
            height: 250px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }
        .playlist-info {
            flex: 1;
        }
        .playlist-type {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .playlist-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .playlist-owner {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 16px;
        }
        .playlist-meta {
            display: flex;
            gap: 24px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .playlist-actions {
            display: flex;
            gap: 12px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .tracks-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
            margin-bottom: 48px;
        }
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .track-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .track-index {
            width: 32px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .track-artists {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .track-duration {
            color: var(--text-secondary);
            margin-left: 16px;
            font-size: 14px;
        }
        .track-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 8px;
        }
        .track-play-btn:hover {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .wave-results {
            margin-top: 48px;
        }
        .wave-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
        }
        .wave-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .wave-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .wave-index {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--accent);
            min-width: 80px;
            margin-right: 16px;
        }
        .wave-info {
            flex: 1;
        }
        .wave-track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .wave-track-artists {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .wave-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }
        .wave-play-btn:hover {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Хедер -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>

    <main class="playlist-page">
        <div id="playlist-content"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>

    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
        })();
    </script>

    <!-- Стили плеера -->
    <style>
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: flex; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { player } from './js/player.js';
        import { api } from './js/api.js';
        import { formatTime, generateCoverPlaceholder } from './js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const playlistId = params.get('id');
        const contentDiv = document.getElementById('playlist-content');
        const errorDiv = document.getElementById('error-message');

        // Хедер
        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
        }

        // Загрузка плейлиста
        async function loadPlaylist() {
            if (!playlistId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Не указан ID плейлиста';
                return;
            }
            try {
                const playlist = await api.get(`/playlists/${playlistId}`);
                // Проверяем, лайкнут ли плейлист
                let isLiked = false;
                if (isAuthenticated()) {
                    try {
                        const data = await api.get('/users/me/favorites/playlist-ids');
                        if (data && data.playlist_ids) {
                            isLiked = data.playlist_ids.some(id => id === playlistId);
                        }
                    } catch (e) {
                        console.warn('Не удалось проверить избранное плейлиста', e);
                    }
                }
                renderPlaylist(playlist, isLiked);
            } catch (e) {
                console.error(e);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Плейлист не найден';
            }
        }

        function renderPlaylist(playlist, isLiked = false) {
            const coverSrc = generateCoverPlaceholder(`${playlist.name}${playlist.id}`, 250);
            const ownerName = playlist.owner?.username || 'Неизвестный';
            const tracks = playlist.tracks || [];
            const totalDuration = tracks.reduce((sum, t) => sum + (t.duration || 0), 0);
            const likeBtnText = isLiked ? '❤️ Убрать лайк' : '❤️ Нравится';

            let html = `
                <div class="playlist-header">
                    <img class="playlist-cover" src="${coverSrc}" alt="${playlist.name}">
                    <div class="playlist-info">
                        <div class="playlist-type">Плейлист</div>
                        <h1 class="playlist-name">${playlist.name}</h1>
                        <div class="playlist-owner">${ownerName}</div>
                        <div class="playlist-meta">
                            <span>⏱ ${formatTime(totalDuration)}</span>
                            <span>🎵 ${tracks.length} треков</span>
                            <span id="playlist-likes">❤️ ${playlist.likes}</span>
                        </div>
                        <div class="playlist-actions">
                            <button class="btn btn-accent" id="play-all-btn">▶ Воспроизвести всё</button>
                            <button class="btn" id="like-playlist-btn">${likeBtnText}</button>
                            <button class="btn" id="wave-playlist-btn">🌊 Волна плейлиста</button>
                        </div>
                    </div>
                </div>
            `;

            // Список треков
            if (tracks.length) {
                html += '<h2 class="section-title">Треки</h2><div class="tracks-list">';
                tracks.forEach((track, idx) => {
                    const duration = formatTime(track.duration);
                    html += `
                        <div class="track-item" data-id="${track.id}">
                            <div class="track-index">${idx + 1}</div>
                            <div class="track-info">
                                <div class="track-name">${track.name}</div>
                                <div class="track-artists"></div>
                            </div>
                            <div class="track-duration">${duration}</div>
                            <button class="track-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="empty-message">В этом плейлисте пока нет треков</div>';
            }

            // Секция для результатов Волны
            html += `
                <div id="wave-section" class="wave-results" style="display: none;">
                    <h2 class="section-title">🌊 Волна плейлиста</h2>
                    <div class="wave-list" id="wave-list"></div>
                    <div id="wave-loading" class="empty-message" style="display: none;">Поиск совпадений…</div>
                    <div id="wave-error" class="empty-message" style="display: none;">Не удалось загрузить рекомендации</div>
                </div>
            `;

            contentDiv.innerHTML = html;

            // Обработчики
            const playAllBtn = document.getElementById('play-all-btn');
            if (playAllBtn && tracks.length) {
                playAllBtn.addEventListener('click', () => {
                    player.loadTrack(tracks[0].id);
                });
            }

            // Обработчики треков
            document.querySelectorAll('.track-item').forEach(item => {
                const playBtn = item.querySelector('.track-play-btn');
                const trackId = item.dataset.id;
                item.addEventListener('click', (e) => {
                    if (e.target === playBtn || playBtn.contains(e.target)) return;
                    window.location.href = `/frontend/track.html?id=${trackId}`;
                });
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.loadTrack(trackId);
                });
            });

            // Лайк плейлиста
            const likeBtn = document.getElementById('like-playlist-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', async () => {
                    const likesSpan = document.getElementById('playlist-likes');
                    try {
                        await api.post(`/playlists/${playlist.id}/like`);
                        likeBtn.textContent = '❤️ Убрать лайк';
                        const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || playlist.likes);
                        likesSpan.textContent = `❤️ ${current + 1}`;
                    } catch (e) {
                        if (e.message.includes('already')) {
                            await api.delete(`/playlists/${playlist.id}/like`);
                            likeBtn.textContent = '❤️ Нравится';
                            const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || playlist.likes);
                            likesSpan.textContent = `❤️ ${Math.max(0, current - 1)}`;
                        }
                    }
                });
            }

            // Волна плейлиста
            const waveBtn = document.getElementById('wave-playlist-btn');
            if (waveBtn) {
                waveBtn.addEventListener('click', () => loadWave(playlist.id));
            }
        }

        async function loadWave(playlistId) {
            const waveSection = document.getElementById('wave-section');
            const waveList = document.getElementById('wave-list');
            const waveLoading = document.getElementById('wave-loading');
            const waveError = document.getElementById('wave-error');

            waveSection.style.display = 'block';
            waveList.innerHTML = '';
            waveLoading.style.display = 'block';
            waveError.style.display = 'none';

            try {
                const similar = await api.post(`/playlists/${playlistId}/wave`, { limit: 20 });
                waveLoading.style.display = 'none';
                if (!similar.length) {
                    waveList.innerHTML = '<div class="empty-message">Совпадений не найдено</div>';
                    return;
                }
                waveList.innerHTML = similar.map(t => {
                    const artistsStr = (t.artists || []).map(a => a.name).join(', ');
                    const uv = t.similarity ? Math.round(t.similarity) : '—';
                    return `
                        <div class="wave-item" data-id="${t.id}">
                            <div class="wave-index">UV ${uv}</div>
                            <div class="wave-info">
                                <div class="wave-track-name">${t.name}</div>
                                <div class="wave-track-artists">${artistsStr}</div>
                            </div>
                            <button class="wave-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.wave-item').forEach(item => {
                    const playBtn = item.querySelector('.wave-play-btn');
                    const trackId = item.dataset.id;
                    item.addEventListener('click', (e) => {
                        if (e.target === playBtn || playBtn.contains(e.target)) return;
                        window.location.href = `/frontend/track.html?id=${trackId}`;
                    });
                    playBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        player.loadTrack(trackId);
                    });
                });
            } catch (e) {
                console.error(e);
                waveLoading.style.display = 'none';
                waveError.style.display = 'block';
            }
        }

        updateHeader();
        loadPlaylist();
    </script>
</body>
</html>
