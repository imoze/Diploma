<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Плейлист</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Существующие стили... */
        .playlist-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .playlist-header {
            display: flex;
            gap: 32px;
            margin-bottom: 48px;
        }
        .playlist-cover {
            width: 250px;
            height: 250px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }
        .playlist-info {
            flex: 1;
        }
        .playlist-type {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .playlist-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .playlist-owner {
            font-size: 16px;
            color: var(--accent);
            margin-bottom: 16px;
        }
        .playlist-meta {
            display: flex;
            gap: 24px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        .playlist-actions {
            display: flex;
            gap: 12px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .tracks-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
            margin-bottom: 48px;
        }
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .track-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .track-item.dragging {
            opacity: 0.5;
        }
        .track-index {
            width: 32px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .track-artists {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .track-duration {
            color: var(--text-secondary);
            margin-left: 16px;
            font-size: 14px;
        }
        .track-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 8px;
        }
        .track-play-btn:hover {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .track-remove-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 4px;
            display: none; /* по умолчанию скрыта */
        }
        .track-remove-btn:hover {
            color: #ff5c5c;
            background: rgba(255, 92, 92, 0.1);
        }
        .edit-controls {
            margin-top: 16px;
            display: none;
        }
        .rename-form {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        .rename-form input {
            flex: 1;
            background: var(--bg-deep);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .rename-form input:focus {
            border-color: var(--accent);
        }
        .add-track-form {
            position: relative;
            display: flex;
            gap: 8px;
            margin-top: 12px;
            align-items: flex-start;
        }
        .search-track-wrapper {
            flex: 1;
            position: relative;
        }
        .search-track-wrapper input {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid transparent;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-track-wrapper input:focus {
            border-color: var(--accent);
        }
        .search-track-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 4px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1001;
            max-height: 200px;
            overflow-y: auto;
        }
        .delete-playlist-btn {
            color: #ff5c5c;
            margin-top: 8px;
        }
        /* Существующие стили для волны... */
        .wave-results {
            margin-top: 48px;
        }
        .wave-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
        }
        .wave-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .wave-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .wave-index {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--accent);
            min-width: 80px;
            margin-right: 16px;
        }
        .wave-info {
            flex: 1;
        }
        .wave-track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .wave-track-artists {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .wave-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }
        .wave-play-btn:hover {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Хедер -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>

    <main class="playlist-page">
        <div id="playlist-content"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>

    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
        })();
    </script>

    <style>
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: flex; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { player } from './js/player.js';
        import { api } from './js/api.js';
        import { formatTime, generateCoverPlaceholder, debounce } from './js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const playlistId = params.get('id');
        const contentDiv = document.getElementById('playlist-content');
        const errorDiv = document.getElementById('error-message');

        let currentPlaylist = null;
        let isOwner = false;
        let editing = false;

        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                    return user;
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
            return null;
        }

        async function loadPlaylist() {
            if (!playlistId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Не указан ID плейлиста';
                return;
            }
            try {
                const playlist = await api.get(`/playlists/${playlistId}`);
                currentPlaylist = playlist;
                const user = await getCurrentUser();
                isOwner = user && playlist.owner && user.id === playlist.owner.id;

                let isLiked = false;
                if (isAuthenticated()) {
                    try {
                        const data = await api.get('/users/me/favorites/playlist-ids');
                        if (data && data.playlist_ids) {
                            isLiked = data.playlist_ids.some(id => id === playlistId);
                        }
                    } catch (e) {}
                }
                renderPlaylist(playlist, isLiked);
            } catch (e) {
                console.error(e);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Плейлист не найден';
            }
        }

        function renderPlaylist(playlist, isLiked = false) {
            const coverSrc = generateCoverPlaceholder(`${playlist.name}${playlist.id}`, 250);
            const ownerName = playlist.owner?.username || 'Неизвестный';
            const tracks = playlist.tracks || [];
            const totalDuration = tracks.reduce((sum, t) => sum + (t.duration || 0), 0);
            const likeBtnText = isLiked ? '❤️ Убрать лайк' : '❤️ Нравится';

            let html = `
                <div class="playlist-header">
                    <img class="playlist-cover" src="${coverSrc}" alt="${playlist.name}">
                    <div class="playlist-info">
                        <div class="playlist-type">Плейлист</div>
                        <h1 class="playlist-name" id="playlist-name-display">${playlist.name}</h1>
                        <div class="playlist-owner">${ownerName}</div>
                        <div class="playlist-meta">
                            <span>⏱ ${formatTime(totalDuration)}</span>
                            <span>🎵 <span id="track-count">${tracks.length}</span> треков</span>
                            <span id="playlist-likes">❤️ ${playlist.likes}</span>
                        </div>
                        <div class="playlist-actions">
                            <button class="btn btn-accent" id="play-all-btn">▶ Воспроизвести всё</button>
                            <button class="btn" id="like-playlist-btn">${likeBtnText}</button>
                            <button class="btn" id="wave-playlist-btn">🌊 Волна плейлиста</button>
                            ${isOwner ? '<button class="btn" id="edit-toggle-btn">✎ Редактировать</button>' : ''}
                        </div>
                        ${isOwner ? `
                        <div class="edit-controls" id="edit-controls" style="display: none;">
                            <div class="rename-form">
                                <input type="text" id="rename-input" placeholder="Новое название" value="${playlist.name}">
                                <button class="btn" id="rename-btn">Переименовать</button>
                            </div>
                            <div class="add-track-form">
                                <div class="search-track-wrapper">
                                    <input type="text" id="search-track-input" placeholder="Поиск трека по названию...">
                                    <div class="search-track-dropdown" id="track-search-dropdown" style="display: none;"></div>
                                </div>
                                <button class="btn btn-accent" id="add-selected-track-btn">Добавить</button>
                            </div>
                            <button class="btn delete-playlist-btn" id="delete-playlist-btn">🗑 Удалить плейлист</button>
                        </div>` : ''}
                    </div>
                </div>
            `;

            if (tracks.length) {
                html += '<h2 class="section-title">Треки</h2><div class="tracks-list" id="tracks-container">';
                tracks.forEach((track, idx) => {
                    const duration = formatTime(track.duration);
                    html += `
                        <div class="track-item" draggable="${isOwner}" data-id="${track.id}" data-idx="${idx}">
                            <div class="track-index">${idx + 1}</div>
                            <div class="track-info">
                                <div class="track-name">${track.name}</div>
                                <div class="track-artists"></div>
                            </div>
                            <div class="track-duration">${duration}</div>
                            <button class="track-play-btn" title="Воспроизвести">▶</button>
                            ${isOwner ? '<button class="track-remove-btn" title="Удалить">✕</button>' : ''}
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="empty-message" id="empty-placeholder">В этом плейлисте пока нет треков</div>';
            }

            // Секция волны
            html += `
                <div id="wave-section" class="wave-results" style="display: none;">
                    <h2 class="section-title">🌊 Волна плейлиста</h2>
                    <div class="wave-list" id="wave-list"></div>
                    <div id="wave-loading" class="empty-message" style="display: none;">Поиск совпадений…</div>
                    <div id="wave-error" class="empty-message" style="display: none;">Не удалось загрузить рекомендации</div>
                </div>
            `;

            contentDiv.innerHTML = html;
            attachPlaylistEvents(playlist);
        }

        function attachPlaylistEvents(playlist) {
            // Воспроизвести всё
            const playAllBtn = document.getElementById('play-all-btn');
            if (playAllBtn && playlist.tracks.length) {
                playAllBtn.addEventListener('click', () => {
                    player.loadTrack(playlist.tracks[0].id);
                });
            }

            // Обработчики треков
            document.querySelectorAll('.track-item').forEach(item => {
                const playBtn = item.querySelector('.track-play-btn');
                const trackId = item.dataset.id;
                item.addEventListener('click', (e) => {
                    if (e.target === playBtn || playBtn.contains(e.target)) return;
                    window.location.href = `/frontend/track.html?id=${trackId}`;
                });
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.loadTrack(trackId);
                });
            });

            // Лайк
            const likeBtn = document.getElementById('like-playlist-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', async () => {
                    const likesSpan = document.getElementById('playlist-likes');
                    try {
                        await api.post(`/playlists/${playlist.id}/like`);
                        likeBtn.textContent = '❤️ Убрать лайк';
                        const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || playlist.likes);
                        likesSpan.textContent = `❤️ ${current + 1}`;
                    } catch (e) {
                        if (e.message.includes('already')) {
                            await api.delete(`/playlists/${playlist.id}/like`);
                            likeBtn.textContent = '❤️ Нравится';
                            const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || playlist.likes);
                            likesSpan.textContent = `❤️ ${Math.max(0, current - 1)}`;
                        }
                    }
                });
            }

            // Волна
            const waveBtn = document.getElementById('wave-playlist-btn');
            if (waveBtn) {
                waveBtn.addEventListener('click', () => loadWave(playlist.id));
            }

            // Редактирование
            if (isOwner) {
                const editToggleBtn = document.getElementById('edit-toggle-btn');
                const editControls = document.getElementById('edit-controls');
                const removeButtons = document.querySelectorAll('.track-remove-btn');
                const tracksContainer = document.getElementById('tracks-container');

                editToggleBtn.addEventListener('click', () => {
                    editing = !editing;
                    editControls.style.display = editing ? 'block' : 'none';
                    removeButtons.forEach(btn => btn.style.display = editing ? 'inline-block' : 'none');
                    editToggleBtn.textContent = editing ? '✓ Готово' : '✎ Редактировать';
                    document.querySelectorAll('.track-item').forEach(item => {
                        item.draggable = editing;
                    });
                });

                // Переименование
                const renameBtn = document.getElementById('rename-btn');
                renameBtn.addEventListener('click', async () => {
                    const newName = document.getElementById('rename-input').value.trim();
                    if (!newName) return alert('Введите новое название');
                    try {
                        await api.patch(`/playlists/${playlist.id}`, { name: newName });
                        document.getElementById('playlist-name-display').textContent = newName;
                        alert('Плейлист переименован');
                    } catch (err) {
                        alert('Ошибка: ' + err.message);
                    }
                });

                // Поиск треков для добавления
                const searchTrackInput = document.getElementById('search-track-input');
                const trackDropdown = document.getElementById('track-search-dropdown');
                let selectedTrackId = null;

                const performTrackSearch = debounce(async (query) => {
                    if (!query) {
                        trackDropdown.style.display = 'none';
                        return;
                    }
                    try {
                        const tracks = await api.get(`/tracks?q=${encodeURIComponent(query)}`);
                        if (tracks.length === 0) {
                            trackDropdown.innerHTML = '<div class="dropdown-item" style="cursor: default; color: var(--text-secondary);">Ничего не найдено</div>';
                        } else {
                            trackDropdown.innerHTML = tracks.slice(0, 5).map(t => {
                                const artists = t.artists?.map(a => a.name).join(', ') || '';
                                return `<div class="dropdown-item" data-track-id="${t.id}">${t.name} — ${artists}</div>`;
                            }).join('');
                        }
                        trackDropdown.style.display = 'block';
                    } catch (e) {
                        console.error(e);
                    }
                }, 300);

                searchTrackInput.addEventListener('input', () => {
                    const query = searchTrackInput.value.trim();
                    performTrackSearch(query);
                });

                document.addEventListener('click', (e) => {
                    if (!searchTrackInput.contains(e.target) && !trackDropdown.contains(e.target)) {
                        trackDropdown.style.display = 'none';
                    }
                });

                trackDropdown.addEventListener('click', (e) => {
                    const item = e.target.closest('.dropdown-item');
                    if (!item) return;
                    selectedTrackId = item.dataset.trackId;
                    searchTrackInput.value = item.textContent.split(' — ')[0];
                    trackDropdown.style.display = 'none';
                });

                // Добавление выбранного трека
                const addSelectedBtn = document.getElementById('add-selected-track-btn');
                addSelectedBtn.addEventListener('click', async () => {
                    if (!selectedTrackId) {
                        alert('Сначала найдите и выберите трек из списка');
                        return;
                    }
                    try {
                        await api.post(`/playlists/${playlist.id}/tracks`, { track_id: selectedTrackId });
                        window.location.reload();
                    } catch (err) {
                        alert('Ошибка добавления трека: ' + err.message);
                    }
                });

                // Удаление трека (делегирование)
                document.addEventListener('click', async (e) => {
                    if (!editing) return;
                    const removeBtn = e.target.closest('.track-remove-btn');
                    if (!removeBtn) return;
                    const trackItem = removeBtn.closest('.track-item');
                    const trackId = trackItem.dataset.id;
                    try {
                        await api.delete(`/playlists/${playlist.id}/tracks/${trackId}`);
                        trackItem.remove();
                        const remaining = document.querySelectorAll('.track-item');
                        document.getElementById('track-count').textContent = remaining.length;
                        remaining.forEach((item, idx) => {
                            item.querySelector('.track-index').textContent = idx + 1;
                            item.dataset.idx = idx;
                        });
                        if (remaining.length === 0) {
                            const emptyMsg = document.createElement('div');
                            emptyMsg.className = 'empty-message';
                            emptyMsg.textContent = 'В этом плейлисте пока нет треков';
                            document.getElementById('tracks-container').replaceWith(emptyMsg);
                        }
                    } catch (err) {
                        alert('Ошибка при удалении трека: ' + err.message);
                    }
                });

                // Удаление плейлиста
                const deleteBtn = document.getElementById('delete-playlist-btn');
                deleteBtn.addEventListener('click', async () => {
                    if (confirm('Вы уверены, что хотите удалить этот плейлист?')) {
                        try {
                            await api.delete(`/playlists/${playlist.id}`);
                            window.location.href = '/frontend/index.html';
                        } catch (err) {
                            alert('Ошибка удаления плейлиста: ' + err.message);
                        }
                    }
                });

                // Drag and drop
                if (tracksContainer) {
                    tracksContainer.addEventListener('dragstart', (e) => {
                        const item = e.target.closest('.track-item');
                        if (!editing || !item) return;
                        e.dataTransfer.setData('text/plain', item.dataset.id);
                        setTimeout(() => item.classList.add('dragging'), 0);
                    });
                    tracksContainer.addEventListener('dragend', (e) => {
                        const item = e.target.closest('.track-item');
                        if (item) item.classList.remove('dragging');
                    });
                    tracksContainer.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        if (!editing) return;
                    });
                    tracksContainer.addEventListener('drop', async (e) => {
                        e.preventDefault();
                        if (!editing) return;
                        const draggedId = e.dataTransfer.getData('text/plain');
                        const target = e.target.closest('.track-item');
                        if (!target || draggedId === target.dataset.id) return;
                        const items = [...tracksContainer.querySelectorAll('.track-item')];
                        const draggedItem = items.find(item => item.dataset.id === draggedId);
                        const targetItem = items.find(item => item.dataset.id === target.dataset.id);
                        if (!draggedItem || !targetItem) return;
                        const draggedIdx = items.indexOf(draggedItem);
                        const targetIdx = items.indexOf(targetItem);
                        if (draggedIdx < targetIdx) {
                            tracksContainer.insertBefore(draggedItem, targetItem.nextSibling);
                        } else {
                            tracksContainer.insertBefore(draggedItem, targetItem);
                        }
                        const newItems = tracksContainer.querySelectorAll('.track-item');
                        const newOrder = [...newItems].map(item => item.dataset.id);
                        newItems.forEach((item, idx) => {
                            item.querySelector('.track-index').textContent = idx + 1;
                            item.dataset.idx = idx;
                        });
                        try {
                            await api.post(`/playlists/${playlist.id}/tracks/reorder`, newOrder);
                        } catch (err) {
                            alert('Ошибка изменения порядка: ' + err.message);
                            window.location.reload();
                        }
                    });
                }
            }
        }

        async function loadWave(playlistId) {
            const waveSection = document.getElementById('wave-section');
            const waveList = document.getElementById('wave-list');
            const waveLoading = document.getElementById('wave-loading');
            const waveError = document.getElementById('wave-error');

            waveSection.style.display = 'block';
            waveList.innerHTML = '';
            waveLoading.style.display = 'block';
            waveError.style.display = 'none';

            try {
                const similar = await api.post(`/playlists/${playlistId}/wave`, { limit: 20 });
                waveLoading.style.display = 'none';
                if (!similar.length) {
                    waveList.innerHTML = '<div class="empty-message">Совпадений не найдено</div>';
                    return;
                }
                waveList.innerHTML = similar.map(t => {
                    const artistsStr = (t.artists || []).map(a => a.name).join(', ');
                    const uv = t.similarity ? Math.round(t.similarity) : '—';
                    return `
                        <div class="wave-item" data-id="${t.id}">
                            <div class="wave-index">UV ${uv}</div>
                            <div class="wave-info">
                                <div class="wave-track-name">${t.name}</div>
                                <div class="wave-track-artists">${artistsStr}</div>
                            </div>
                            <button class="wave-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.wave-item').forEach(item => {
                    const playBtn = item.querySelector('.wave-play-btn');
                    const trackId = item.dataset.id;
                    item.addEventListener('click', (e) => {
                        if (e.target === playBtn || playBtn.contains(e.target)) return;
                        window.location.href = `/frontend/track.html?id=${trackId}`;
                    });
                    playBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        player.loadTrack(trackId);
                    });
                });
            } catch (e) {
                console.error(e);
                waveLoading.style.display = 'none';
                waveError.style.display = 'block';
            }
        }

        updateHeader();
        loadPlaylist();
    </script>
</body>
