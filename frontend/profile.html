<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Профиль</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .profile-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .profile-header {
            display: flex;
            gap: 32px;
            margin-bottom: 48px;
            align-items: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--accent);
        }
        .profile-info {
            flex: 1;
        }
        .profile-username {
            font-size: 32px;
            font-weight: 600;
        }
        .profile-stats {
            display: flex;
            gap: 24px;
            color: var(--text-secondary);
            margin: 12px 0;
        }
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--bg-card);
            padding-bottom: 8px;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 500;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: var(--transition);
        }
        .tab-btn.active {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .entity-list {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }
        .entity-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 16px;
            width: 200px;
            cursor: pointer;
            transition: var(--transition);
        }
        .entity-card:hover {
            background: var(--bg-card-hover);
            transform: scale(1.02);
        }
        .entity-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-deep));
            margin-bottom: 8px;
        }
        .entity-card .card-title {
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .entity-card .card-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .privacy-form {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 400px;
        }
        .privacy-form h3 {
            margin-bottom: 16px;
            font-weight: 500;
        }
        .privacy-form label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        .privacy-form button {
            margin-top: 16px;
        }
        .empty-message {
            color: var(--text-secondary);
            padding: 20px;
        }
    </style>
</head>
<body>
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">U<span style="color: var(--accent);">:</span>V</a>
        <div class="header-actions">
            <button class="btn" id="logout-btn" style="display: none;">Выйти</button>
        </div>
    </header>

    <main class="profile-page">
        <div id="profile-content"></div>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>
    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `<img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover"><div class="player-info"><div id="player-track-name" class="player-track-link">Не выбран трек</div><div id="player-artist-name" class="player-artist-name"></div></div><div class="player-controls"><button id="player-play" class="player-btn">▶</button><button id="player-next" class="player-btn">⏭</button></div><div class="player-progress-container"><span id="player-current-time" class="player-time">0:00</span><input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0"><span id="player-duration" class="player-time">0:00</span></div><div class="player-actions"><button id="player-like" class="player-btn">❤️</button><button id="player-wave" class="player-btn">🌊</button><button id="player-expand" class="player-btn">⤢</button></div>`;
        })();
    </script>
    <style>
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 180px; background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: 20px 32px; display: flex; align-items: center; gap: 24px; z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3); }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress { flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px; -webkit-appearance: none; appearance: none; }
        .player-progress::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn { background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; transition: var(--transition); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .player-btn:hover { color: var(--accent); background: rgba(138,92,255,0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser, logout, requireAuth } from './js/auth.js';
        import { api } from './js/api.js';
        import { player } from './js/player.js';
        import { generateCoverPlaceholder } from './js/utils.js';

        requireAuth();

        const contentDiv = document.getElementById('profile-content');
        let currentUser = null;

        async function loadStats() {
            try {
                const [trackIds, playlistIds, artistIds, albumIds] = await Promise.all([
                    api.get('/users/me/favorites/ids').then(r => r.track_ids || []),
                    api.get('/users/me/favorites/playlist-ids').then(r => r.playlist_ids || []),
                    api.get('/users/me/favorites/artist-ids').then(r => r.artist_ids || []),
                    api.get('/users/me/favorites/album-ids').then(r => r.album_ids || []),
                ]);
                document.getElementById('fav-counts').textContent = 
                    `❤️ ${trackIds.length} треков · ${playlistIds.length} плейлистов · ${artistIds.length} артистов · ${albumIds.length} альбомов`;
            } catch (e) {
                document.getElementById('fav-counts').textContent = '';
            }
        }

        async function init() {
            try {
                currentUser = await getCurrentUser();
                if (!currentUser) {
                    logout();
                    return;
                }
                renderProfile();
                document.getElementById('logout-btn').style.display = 'inline-flex';
                document.getElementById('logout-btn').addEventListener('click', () => logout());
            } catch (e) {
                console.error(e);
                logout();
            }
        }

        function renderProfile() {
            const html = `
                <div class="profile-header">
                    <div class="profile-avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <div class="profile-info">
                        <h1 class="profile-username">${currentUser.username}</h1>
                        <div class="profile-stats">
                            <span id="fav-counts">Загрузка...</span>
                        </div>
                    </div>
                </div>
                <div class="tabs" id="tabs">
                    <button class="tab-btn active" data-tab="tracks">Треки</button>
                    <button class="tab-btn" data-tab="playlists">Плейлисты</button>
                    <button class="tab-btn" data-tab="artists">Артисты</button>
                    <button class="tab-btn" data-tab="albums">Альбомы</button>
                    <button class="tab-btn" data-tab="settings">Настройки</button>
                </div>
                <div id="tab-content-container"></div>
            `;
            contentDiv.innerHTML = html;
            setupTabs();
            loadStats();
            loadTabContent('tracks');
        }

        function setupTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    loadTabContent(tab);
                });
            });
        }

        async function loadTabContent(tab) {
            const container = document.getElementById('tab-content-container');
            container.innerHTML = '<div class="empty-message">Загрузка...</div>';
            try {
                switch (tab) {
                    case 'tracks':
                        const tracks = await api.get('/users/me/favorites/tracks');
                        renderEntityCards(tracks, 'track', 'tracks');
                        break;
                    case 'playlists':
                        const playlists = await api.get('/users/me/favorites/playlists');
                        renderEntityCards(playlists, 'playlist', 'playlists');
                        break;
                    case 'artists':
                        const artists = await api.get('/users/me/favorites/artists');
                        renderEntityCards(artists, 'artist', 'artists');
                        break;
                    case 'albums':
                        const albums = await api.get('/users/me/favorites/albums');
                        renderEntityCards(albums, 'album', 'albums');
                        break;
                    case 'settings':
                        renderSettings();
                        break;
                }
            } catch (e) {
                container.innerHTML = '<div class="empty-message">Ошибка загрузки</div>';
            }
        }

        function renderEntityCards(items, type, entityPlural) {
            const container = document.getElementById('tab-content-container');
            if (!items.length) {
                container.innerHTML = `<div class="empty-message">Нет избранных ${entityPlural}</div>`;
                return;
            }
            let html = '<div class="entity-list">';
            items.forEach(item => {
                const cover = generateCoverPlaceholder(`${item.name}${item.id}`, 200);
                let subtitle = '';
                if (type === 'track' && item.artists) subtitle = item.artists.map(a => a.name).join(', ');
                else if (type === 'playlist') subtitle = item.owner?.username || '';
                else if (type === 'album' && item.artists) subtitle = item.artists.map(a => a.name).join(', ');
                html += `
                    <div class="entity-card" data-type="${type}" data-id="${item.id}">
                        <img src="${cover}" alt="${item.name}">
                        <div class="card-title">${item.name}</div>
                        <div class="card-subtitle">${subtitle}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;

            document.querySelectorAll('.entity-card').forEach(card => {
                card.addEventListener('click', () => {
                    const type = card.dataset.type;
                    const id = card.dataset.id;
                    if (type === 'track') window.location.href = `/frontend/track.html?id=${id}`;
                    else if (type === 'playlist') window.location.href = `/frontend/playlist.html?id=${id}`;
                    else if (type === 'artist') window.location.href = `/frontend/artist.html?id=${id}`;
                    else if (type === 'album') window.location.href = `/frontend/album.html?id=${id}`;
                });
            });
        }

        async function renderSettings() {
            const container = document.getElementById('tab-content-container');
            const profile = currentUser;
            const html = `
                <div class="privacy-form">
                    <h3>Приватность избранного</h3>
                    <label>
                        Треки
                        <input type="checkbox" id="priv-tracks" ${profile.is_fav_tracks_public ? 'checked' : ''}>
                    </label>
                    <label>
                        Плейлисты
                        <input type="checkbox" id="priv-playlists" ${profile.is_fav_playlists_public ? 'checked' : ''}>
                    </label>
                    <label>
                        Артисты
                        <input type="checkbox" id="priv-artists" ${profile.is_fav_artists_public ? 'checked' : ''}>
                    </label>
                    <label>
                        Альбомы
                        <input type="checkbox" id="priv-albums" ${profile.is_fav_albums_public ? 'checked' : ''}>
                    </label>
                    <button class="btn btn-accent" id="save-privacy-btn">Сохранить</button>
                </div>
            `;
            container.innerHTML = html;
            document.getElementById('save-privacy-btn').addEventListener('click', async () => {
                const data = {
                    is_fav_tracks_public: document.getElementById('priv-tracks').checked,
                    is_fav_playlists_public: document.getElementById('priv-playlists').checked,
                    is_fav_artists_public: document.getElementById('priv-artists').checked,
                    is_fav_albums_public: document.getElementById('priv-albums').checked,
                };
                try {
                    await api.patch('/users/me/profile', data);
                    alert('Настройки сохранены');
                } catch (e) {
                    alert('Ошибка: ' + e.message);
                }
            });
        }

        init();
    </script>
</body>
</html>
