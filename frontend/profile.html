<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Профиль</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .profile-page { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
        .profile-header { display: flex; gap: 32px; margin-bottom: 48px; align-items: center; }
        .profile-avatar {
            width: 120px; height: 120px; border-radius: 50%; background: var(--bg-card);
            display: flex; align-items: center; justify-content: center; font-size: 48px; color: var(--accent);
        }
        .profile-info { flex: 1; }
        .profile-username { font-size: 32px; font-weight: 600; }
        .profile-stats { display: flex; gap: 24px; color: var(--text-secondary); margin: 12px 0; }
        .tabs { display: flex; gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--bg-card); padding-bottom: 8px; }
        .tab-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 18px; font-weight: 500;
            padding: 8px 16px; cursor: pointer; border-radius: var(--radius-md); transition: var(--transition);
        }
        .tab-btn.active { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .entity-list { display: flex; flex-wrap: wrap; gap: 16px; }
        .entity-card {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 16px;
            width: 200px; cursor: pointer; transition: var(--transition);
        }
        .entity-card:hover { background: var(--bg-card-hover); transform: scale(1.02); }
        .entity-card img {
            width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-deep)); margin-bottom: 8px;
        }
        .entity-card .card-title { font-size: 16px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .entity-card .card-subtitle { font-size: 14px; color: var(--text-secondary); }
        .privacy-form {
            background: var(--bg-card); border-radius: var(--radius-lg); padding: 24px; max-width: 400px;
        }
        .privacy-form h3 { margin-bottom: 16px; font-weight: 500; }
        .privacy-form label {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; color: var(--text-secondary);
        }
        .privacy-form button { margin-top: 16px; }
        .empty-message { color: var(--text-secondary); padding: 20px; }

        /* Стили плеера */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: none; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
        /* Модальное окно */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-card); border-radius: var(--radius-lg);
            padding: 32px; width: 100%; max-width: 400px;
        }
        .modal-content label {
            color: var(--text-secondary); font-size: 14px; display: block; margin-bottom: 6px;
        }
        .modal-content .input {
            width: 100%;
        }
        .modal-content .form-group {
            margin-bottom: 16px;
        }
        .modal-content h3 {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <button class="btn" id="logout-btn" style="display: none;">Выйти</button>
        </div>
    </header>

    <main class="profile-page">
        <div id="profile-content"></div>
    </main>

    <div id="player-bar" class="player-bar"></div>

    <script type="module">
        import { isAuthenticated, getCurrentUser, logout, requireAuth } from './js/auth.js';
        import { api } from './js/api.js';
        import { generateCoverPlaceholder } from './js/utils.js';

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');
        let currentUser = null;
        let isOwnProfile = false;
        const contentDiv = document.getElementById('profile-content');

        async function init() {
            if (isAuthenticated()) {
                try { currentUser = await getCurrentUser(); } catch(e) {}
            }
            if (!profileId || (currentUser && profileId === currentUser.id)) {
                if (!currentUser) {
                    window.location.href = '/frontend/login.html';
                    return;
                }
                isOwnProfile = true;
            } else {
                isOwnProfile = false;
            }
            renderProfile();
        }

        async function renderProfile() {
            let profile;
            if (isOwnProfile) {
                profile = currentUser;
                document.getElementById('logout-btn').style.display = 'inline-flex';
                document.getElementById('logout-btn').onclick = logout;
            } else {
                try {
                    profile = await api.get(`/users/${profileId}/profile`);
                } catch (e) {
                    contentDiv.innerHTML = '<div class="empty-message">Пользователь не найден</div>';
                    return;
                }
                document.getElementById('logout-btn').style.display = 'none';
            }

            const avatarLetter = profile.username.charAt(0).toUpperCase();
            let tabsHtml = '';
            if (isOwnProfile) {
                tabsHtml = `
                    <button class="tab-btn active" data-tab="tracks">Треки</button>
                    <button class="tab-btn" data-tab="playlists">Плейлисты</button>
                    <button class="tab-btn" data-tab="artists">Артисты</button>
                    <button class="tab-btn" data-tab="albums">Альбомы</button>
                    <button class="tab-btn" data-tab="settings">Настройки</button>`;
            } else {
                if (profile.is_fav_tracks_public) tabsHtml += '<button class="tab-btn active" data-tab="tracks">Треки</button>';
                if (profile.is_fav_playlists_public) tabsHtml += '<button class="tab-btn" data-tab="playlists">Плейлисты</button>';
                if (profile.is_fav_artists_public) tabsHtml += '<button class="tab-btn" data-tab="artists">Артисты</button>';
                if (profile.is_fav_albums_public) tabsHtml += '<button class="tab-btn" data-tab="albums">Альбомы</button>';
                if (!tabsHtml.includes('tab-btn')) tabsHtml = '<span class="empty-message">Нет публичных разделов</span>';
            }

            contentDiv.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${avatarLetter}</div>
                    <div class="profile-info">
                        <h1 class="profile-username">${profile.username}</h1>
                        <div class="profile-stats" id="fav-counts">${isOwnProfile ? 'Загрузка...' : ''}</div>
                    </div>
                </div>
                <div class="tabs" id="tabs">${tabsHtml}</div>
                <div id="tab-content-container"></div>`;

            if (isOwnProfile) {
                loadStats();
            } else {
                loadGuestStats(profileId);
            }
            setupTabs(isOwnProfile);
            // загружаем первую доступную вкладку
            const firstTab = document.querySelector('.tab-btn');
            if (firstTab) loadTabContent(firstTab.dataset.tab, isOwnProfile);
        }

        function setupTabs(isOwn) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadTabContent(btn.dataset.tab, isOwn);
                });
            });
        }

        async function loadTabContent(tab, isOwn) {
            const container = document.getElementById('tab-content-container');
            container.innerHTML = '<div class="empty-message">Загрузка...</div>';
            if (tab === 'settings' && isOwn) return renderSettings();

            const userId = isOwn ? currentUser.id : profileId;
            const base = isOwn ? '/users/me/favorites' : `/users/${userId}/favorites`;

            try {
                if (tab === 'playlists') {
                    const items = await api.get(`${base}/playlists`);
                    renderPlaylistsTab(items, isOwn);
                    return;
                }

                let items;
                switch (tab) {
                    case 'tracks': items = await api.get(`${base}/tracks`); break;
                    case 'artists': items = await api.get(`${base}/artists`); break;
                    case 'albums': items = await api.get(`${base}/albums`); break;
                }
                renderEntityCards(items, tab.slice(0, -1));
            } catch (e) {
                container.innerHTML = '<div class="empty-message">Ошибка загрузки</div>';
            }
        }

        function renderEntityCards(items, type) {
            const container = document.getElementById('tab-content-container');
            if (!items || !items.length) {
                container.innerHTML = `<div class="empty-message">Нет избранных ${type === 'track' ? 'треков' : type === 'playlist' ? 'плейлистов' : type === 'artist' ? 'артистов' : 'альбомов'}</div>`;
                return;
            }
            let html = '<div class="entity-list">';
            items.forEach(item => {
                const cover = generateCoverPlaceholder(`${item.name}${item.id}`, 200);
                let subtitle = '';
                if (type === 'track' && item.artists) subtitle = item.artists.map(a => a.name).join(', ');
                else if (type === 'playlist') subtitle = item.owner?.username || '';
                else if (type === 'album' && item.artists) subtitle = item.artists.map(a => a.name).join(', ');
                html += `
                    <div class="entity-card" data-type="${type}" data-id="${item.id}">
                        <img src="${cover}" alt="${item.name}">
                        <div class="card-title">${item.name}</div>
                        <div class="card-subtitle">${subtitle}</div>
                    </div>`;
            });
            html += '</div>';
            container.innerHTML = html;
            container.querySelectorAll('.entity-card').forEach(card => {
                card.addEventListener('click', () => {
                    const t = card.dataset.type;
                    const id = card.dataset.id;
                    if (t === 'track') window.location.href = `/frontend/track.html?id=${id}`;
                    else if (t === 'playlist') window.location.href = `/frontend/playlist.html?id=${id}`;
                    else if (t === 'artist') window.location.href = `/frontend/artist.html?id=${id}`;
                    else if (t === 'album') window.location.href = `/frontend/album.html?id=${id}`;
                });
            });
        }

        function renderPlaylistsTab(items, isOwn) {
            const container = document.getElementById('tab-content-container');
            if (isOwn) {
                // Добавляем кнопку создания над списком
                let html = '<div style="margin-bottom: 16px;">';
                html += '<button class="btn btn-accent" id="create-playlist-btn">+ Создать плейлист</button>';
                html += '</div>';
                if (!items || items.length === 0) {
                    html += '<div class="empty-message">Нет плейлистов</div>';
                } else {
                    html += '<div class="entity-list">';
                    items.forEach(item => {
                        const cover = generateCoverPlaceholder(`${item.name}${item.id}`, 200);
                        html += `
                            <div class="entity-card" data-type="playlist" data-id="${item.id}">
                                <img src="${cover}" alt="${item.name}">
                                <div class="card-title">${item.name}</div>
                                <div class="card-subtitle">${item.owner?.username || ''}</div>
                            </div>`;
                    });
                    html += '</div>';
                }
                container.innerHTML = html;
                // Обработчики карточек
                container.querySelectorAll('.entity-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const id = card.dataset.id;
                        window.location.href = `/frontend/playlist.html?id=${id}`;
                    });
                });
                // Обработчик кнопки создания
                document.getElementById('create-playlist-btn').addEventListener('click', openCreatePlaylistModal);
            } else {
                // Для чужого профиля оставляем стандартную отрисовку карточек
                renderEntityCards(items, 'playlist');
            }
        }

        async function renderSettings() {
            const container = document.getElementById('tab-content-container');
            container.innerHTML = `
                <div class="privacy-form">
                    <h3>Приватность избранного</h3>
                    <label><input type="checkbox" id="priv-tracks" ${currentUser.is_fav_tracks_public ? 'checked' : ''}> Треки</label>
                    <label><input type="checkbox" id="priv-playlists" ${currentUser.is_fav_playlists_public ? 'checked' : ''}> Плейлисты</label>
                    <label><input type="checkbox" id="priv-artists" ${currentUser.is_fav_artists_public ? 'checked' : ''}> Артисты</label>
                    <label><input type="checkbox" id="priv-albums" ${currentUser.is_fav_albums_public ? 'checked' : ''}> Альбомы</label>
                    <button class="btn btn-accent" id="save-privacy-btn">Сохранить</button>
                </div>`;
            document.getElementById('save-privacy-btn').onclick = async () => {
                const data = {
                    is_fav_tracks_public: document.getElementById('priv-tracks').checked,
                    is_fav_playlists_public: document.getElementById('priv-playlists').checked,
                    is_fav_artists_public: document.getElementById('priv-artists').checked,
                    is_fav_albums_public: document.getElementById('priv-albums').checked,
                };
                await api.patch('/users/me/profile', data);
                alert('Настройки сохранены');
            };
        }

        async function loadStats() {
            try {
                const [tIds, pIds, aIds, alIds] = await Promise.all([
                    api.get('/users/me/favorites/ids').then(r => r.track_ids || []),
                    api.get('/users/me/favorites/playlist-ids').then(r => r.playlist_ids || []),
                    api.get('/users/me/favorites/artist-ids').then(r => r.artist_ids || []),
                    api.get('/users/me/favorites/album-ids').then(r => r.album_ids || []),
                ]);
                document.getElementById('fav-counts').textContent =
                    `❤️ ${tIds.length} треков · ${pIds.length} плейлистов · ${aIds.length} артистов · ${alIds.length} альбомов`;
            } catch(e) {}
        }

        async function loadGuestStats(userId) {
            try {
                const [tIds, pIds, aIds, alIds] = await Promise.all([
                    api.get(`/users/${userId}/favorites/ids`).then(r => r.track_ids || []),
                    api.get(`/users/${userId}/favorites/playlist-ids`).then(r => r.playlist_ids || []),
                    api.get(`/users/${userId}/favorites/artist-ids`).then(r => r.artist_ids || []),
                    api.get(`/users/${userId}/favorites/album-ids`).then(r => r.album_ids || []),
                ]);
                const countsEl = document.getElementById('fav-counts');
                if (countsEl) {
                    countsEl.textContent = `❤️ ${tIds.length} треков · ${pIds.length} плейлистов · ${aIds.length} артистов · ${alIds.length} альбомов`;
                }
            } catch (e) {
                console.error('Failed to load guest stats', e);
                const countsEl = document.getElementById('fav-counts');
                if (countsEl) countsEl.textContent = '';
            }
        }

        function openCreatePlaylistModal() {
            // Создаем простое модальное окно в стиле U:V
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3 style="margin-bottom: 20px;">Новый плейлист</h3>
                    <div class="form-group">
                        <label>Название</label>
                        <input type="text" id="new-playlist-name" class="input" placeholder="Мой плейлист">
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label>
                            <input type="checkbox" id="new-playlist-public" checked> Публичный
                        </label>
                    </div>
                    <div class="modal-actions" style="margin-top: 24px; display: flex; gap: 12px; justify-content: flex-end;">
                        <button class="btn" id="cancel-playlist-btn">Отмена</button>
                        <button class="btn btn-accent" id="save-playlist-btn">Создать</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Обработчики
            document.getElementById('save-playlist-btn').addEventListener('click', async () => {
                const name = document.getElementById('new-playlist-name').value.trim();
                const isPublic = document.getElementById('new-playlist-public').checked;
                if (!name) {
                    alert('Введите название');
                    return;
                }
                try {
                    const newPlaylist = await api.post('/playlists', {
                        name: name,
                        is_public: isPublic
                    });
                    // Сразу добавляем в избранное
                    try {
                        await api.post(`/playlists/${newPlaylist.id}/like`);
                    } catch (likeErr) {
                        // Если уже лайкнут — ничего страшного
                    }
                    document.body.removeChild(modal);
                    // Обновляем статистику и перезагружаем вкладку плейлистов
                    if (isOwnProfile) loadStats();
                    loadTabContent('playlists', true);
                } catch (e) {
                    alert('Ошибка создания плейлиста: ' + e.message);
                }
            });

            // Закрытие по клику вне модала
            modal.addEventListener('click', (e) => {
                if (e.target === modal) document.body.removeChild(modal);
            });
        }

        init();
    </script>

    <script type="module">
        import { player } from '/frontend/js/player.js';
        window.player = player;

        const bar = document.getElementById('player-bar');
        bar.innerHTML = `
            <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
            <div class="player-info">
                <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                <div id="player-artist-name" class="player-artist-name"></div>
            </div>
            <div class="player-controls">
                <button id="player-play" class="player-btn">▶</button>
                <button id="player-next" class="player-btn">⏭</button>
            </div>
            <div class="player-progress-container">
                <span id="player-current-time" class="player-time">0:00</span>
                <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                <span id="player-duration" class="player-time">0:00</span>
            </div>
            <div class="player-actions">
                <button id="player-like" class="player-btn">❤️</button>
                <button id="player-wave" class="player-btn">🌊</button>
                <button id="player-expand" class="player-btn">⤢</button>
            </div>
        `;
        bar.style.display = 'none';
        if (player.currentTrack) bar.style.display = 'flex';
    </script>
</body>
</html>
