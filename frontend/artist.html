<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Артист</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .artist-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .artist-header {
            display: flex;
            gap: 32px;
            margin-bottom: 48px;
        }
        .artist-avatar {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }
        .artist-info {
            flex: 1;
        }
        .artist-name {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .artist-dates {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .artist-description {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .artist-stats {
            display: flex;
            gap: 24px;
            color: var(--text-secondary);
        }
        .artist-actions {
            margin-top: 16px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .albums-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 48px;
        }
        .tracks-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
            margin-bottom: 48px;
        }
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .track-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .track-index {
            width: 32px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .track-meta {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .track-duration {
            color: var(--text-secondary);
            margin-left: 16px;
            font-size: 14px;
        }
        .track-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 8px;
        }
        .track-play-btn:hover {
            color: var(--accent);
            background: rgba(138,92,255,0.1);
        }
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <!-- Хедер -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>

    <main class="artist-page">
        <div id="artist-content"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>

    <!-- Инициализация структуры плеера -->
    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
        })();
    </script>

    <!-- Стили плеера -->
    <style>
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: flex; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { player } from './js/player.js';
        import { api } from './js/api.js';
        import { formatTime, generateCoverPlaceholder } from './js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const artistId = params.get('id');
        const contentDiv = document.getElementById('artist-content');
        const errorDiv = document.getElementById('error-message');

        // Хедер
        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
        }

        // Загрузка всех данных
        async function loadArtist() {
            if (!artistId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Не указан ID артиста';
                return;
            }
            try {
                // Основная информация
                const artist = await api.get(`/artists/${artistId}`);
                // Проверяем, лайкнут ли артист
                let isLiked = false;
                if (isAuthenticated()) {
                    try {
                        const data = await api.get('/users/me/favorites/artist-ids');
                        if (data && data.artist_ids) {
                            isLiked = data.artist_ids.some(id => id === artistId);
                        }
                    } catch (e) {
                        console.warn('Не удалось проверить избранное артиста', e);
                    }
                }
                // Загружаем все треки и альбомы (отсортированные по популярности)
                const [allTracks, allAlbums] = await Promise.all([
                    api.get(`/artists/${artistId}/tracks`),
                    api.get(`/artists/${artistId}/albums`)
                ]);
                renderArtist(artist, allTracks, allAlbums, isLiked);
            } catch (e) {
                console.error(e);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Артист не найден';
            }
        }

        function renderArtist(artist, tracks, albums, isLiked = false) {
            const coverSrc = generateCoverPlaceholder(`${artist.name}${artist.id}`, 250);
            const datesStr = artist.disbandment_date
                ? `${artist.formation_date} — ${artist.disbandment_date}`
                : `${artist.formation_date} — настоящее время`;
            const description = artist.description || '';
            const likeBtnText = isLiked ? '❤️ Убрать лайк' : '❤️ Нравится';

            let html = `
                <div class="artist-header">
                    <img class="artist-avatar" src="${coverSrc}" alt="${artist.name}">
                    <div class="artist-info">
                        <h1 class="artist-name">${artist.name}</h1>
                        <div class="artist-dates">${datesStr}</div>
                        ${description ? `<p class="artist-description">${description}</p>` : ''}
                        <div class="artist-stats">
                            <span id="artist-likes">❤️ ${artist.likes}</span>
                            <span id="artist-plays">▶ ${artist.plays}</span>
                        </div>
                        <div class="artist-actions">
                            <button class="btn" id="like-artist-btn">${likeBtnText}</button>
                        </div>
                    </div>
                </div>
            `;

            // Альбомы (если есть)
            if (albums && albums.length) {
                html += '<h2 class="section-title">Альбомы</h2><div class="albums-grid">';
                albums.forEach(album => {
                    const albumCover = generateCoverPlaceholder(`${album.name}${album.id}`, 250);
                    html += `
                        <div class="card" data-id="${album.id}" style="cursor: pointer;">
                            <img class="card-img" src="${albumCover}" alt="${album.name}">
                            <div class="card-title">${album.name}</div>
                            <div class="card-subtitle">${album.release_date} · ▶ ${album.plays}</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            // Все треки
            if (tracks && tracks.length) {
                html += '<h2 class="section-title">Треки</h2><div class="tracks-list">';
                tracks.forEach((track, idx) => {
                    const duration = formatTime(track.duration);
                    html += `
                        <div class="track-item" data-id="${track.id}">
                            <div class="track-index">${idx + 1}</div>
                            <div class="track-info">
                                <div class="track-name">${track.name}</div>
                                <div class="track-meta">▶ ${track.plays} · ❤️ ${track.likes}</div>
                            </div>
                            <div class="track-duration">${duration}</div>
                            <button class="track-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                });
                html += '</div>';
            }

            contentDiv.innerHTML = html;

            // Обработчики альбомов
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    window.location.href = `/frontend/album.html?id=${card.dataset.id}`;
                });
            });

            // Обработчики треков
            document.querySelectorAll('.track-item').forEach(item => {
                const playBtn = item.querySelector('.track-play-btn');
                const trackId = item.dataset.id;
                item.addEventListener('click', (e) => {
                    if (e.target === playBtn || playBtn.contains(e.target)) return;
                    window.location.href = `/frontend/track.html?id=${trackId}`;
                });
                playBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    player.loadTrack(trackId);
                });
            });

            // Кнопка лайка артиста
            const likeBtn = document.getElementById('like-artist-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', async () => {
                    const likesSpan = document.getElementById('artist-likes');
                    try {
                        await api.post(`/artists/${artist.id}/like`);
                        likeBtn.textContent = '❤️ Убрать лайк';
                        const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || artist.likes);
                        likesSpan.textContent = `❤️ ${current + 1}`;
                    } catch (e) {
                        if (e.message.includes('already')) {
                            await api.delete(`/artists/${artist.id}/like`);
                            likeBtn.textContent = '❤️ Нравится';
                            const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || artist.likes);
                            likesSpan.textContent = `❤️ ${Math.max(0, current - 1)}`;
                        }
                    }
                });
            }
        }

        updateHeader();
        loadArtist();
    </script>
</body>
</html>
