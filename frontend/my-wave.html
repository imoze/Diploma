<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>U:V · Моя волна</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .wave-page { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
        .wave-title { font-size: 32px; font-weight: 600; margin-bottom: 24px; }
        .wave-list { background: var(--bg-card); border-radius: var(--radius-lg); padding: 8px 0; }
        .wave-item { display: flex; align-items: center; padding: 12px 16px; transition: background 0.2s; cursor: pointer; }
        .wave-item:hover { background: rgba(138, 92, 255, 0.08); }

        /* UV Index с цветовой градацией */
        .uv-index {
            font-family: var(--font-mono);
            font-size: 20px;
            min-width: 80px;
            margin-right: 16px;
            text-align: center;
            transition: color 0.3s;
        }
        .uv-index.uv-high { color: #8A5CFF; }       /* >= 95 */
        .uv-index.uv-mid { color: #B79AFF; }        /* 70-94 */
        .uv-index.uv-low { color: #A8A0C0; }        /* < 70 */

        .wave-track-info { flex: 1; }
        .wave-track-name { font-weight: 500; color: var(--text-primary); }
        .wave-track-artists { font-size: 14px; color: var(--text-secondary); }
        .wave-track-duration { margin-left: 12px; font-size: 14px; color: var(--text-secondary); min-width: 50px; text-align: right; }

        .wave-actions { display: flex; gap: 8px; margin-left: 8px; align-items: center; }
        .play-btn, .like-btn {
            background: none; border: none; font-size: 18px; cursor: pointer;
            padding: 8px; border-radius: 50%; transition: var(--transition);
            color: var(--text-secondary);
        }
        .play-btn:hover, .like-btn:hover {
            color: var(--accent); background: rgba(138, 92, 255, 0.1);
        }
        .like-btn.liked { color: var(--accent); }

        .loading, .empty {
            text-align: center; padding: 60px; color: var(--text-secondary);
        }
        .empty a { color: var(--accent); text-decoration: none; }
        .empty a:hover { text-decoration: underline; }

        /* Стили плеера (дублируем для автономности, но плеер теперь создаётся динамически) */
        .player-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: none; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; padding: 24px 32px;">
        <a href="/frontend/index.html" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <a href="/frontend/profile.html" class="btn">Профиль</a>
    </header>

    <main class="wave-page">
        <h1 class="wave-title">🌊 Моя волна</h1>
        <div id="wave-container">
            <div class="loading">Ищем музыку...</div>
        </div>
    </main>

    <!-- Глобальный плеер (пустой контейнер, заполнится скриптом) -->
    <div id="player-bar" class="player-bar"></div>

    <script>
        // Создаём структуру плеера (как в index.html)
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
            bar.style.display = 'none';

            // Импортируем плеер и сохраняем глобально
            import('./js/player.js').then(module => {
                window.player = module.player;
                if (module.player.currentTrack) {
                    bar.style.display = 'flex';
                }
            });
        })();
    </script>

    <script type="module">
        import { requireAuth } from './js/auth.js';
        import { api } from './js/api.js';
        import { formatTime } from './js/utils.js';

        requireAuth();

        const container = document.getElementById('wave-container');

        // Функция для определения цветового класса UV Index
        function getUvClass(similarity) {
            if (similarity >= 95) return 'uv-high';
            if (similarity >= 70) return 'uv-mid';
            return 'uv-low';
        }

        async function loadWave() {
            try {
                const tracks = await api.get('/users/me/wave');

                if (!Array.isArray(tracks) || tracks.length === 0) {
                    container.innerHTML = `
                        <div class="empty">
                            Пока нет рекомендаций.<br>
                            <a href="/frontend/index.html">Поставьте лайки любимым трекам</a>, чтобы волна заработала.
                        </div>`;
                    return;
                }

                // Рендерим список
                const html = '<div class="wave-list">' + tracks.map(t => {
                    const artists = (t.artists || []).map(a => a.name).join(', ');
                    const uv = t.similarity ? Math.round(t.similarity) : 0;
                    const uvClass = getUvClass(uv);
                    const duration = t.duration ? formatTime(t.duration) : '--:--';

                    return `
                        <div class="wave-item" data-id="${t.id}">
                            <span class="uv-index ${uvClass}">UV ${uv}</span>
                            <div class="wave-track-info">
                                <div class="wave-track-name">${t.name}</div>
                                <div class="wave-track-artists">${artists}</div>
                            </div>
                            <span class="wave-track-duration">${duration}</span>
                            <div class="wave-actions">
                                <button class="like-btn" data-id="${t.id}">❤️</button>
                                <button class="play-btn" title="Воспроизвести">▶</button>
                            </div>
                        </div>
                    `;
                }).join('') + '</div>';

                container.innerHTML = html;

                // Обработчики для кнопок и строк
                attachWaveEvents();
            } catch (err) {
                container.innerHTML = `
                    <div class="empty">
                        Ошибка загрузки: ${err.message}.<br>
                        <a href="/frontend/index.html">Попробуйте позже</a>
                    </div>`;
                console.error(err);
            }
        }

        async function toggleLike(trackId, button) {
            try {
                await api.post(`/tracks/${trackId}/like`);
                button.classList.add('liked');
            } catch (e) {
                if (e.message && e.message.includes('already')) {
                    await api.delete(`/tracks/${trackId}/like`);
                    button.classList.remove('liked');
                } else {
                    console.error('Ошибка лайка:', e);
                }
            }
        }

        function attachWaveEvents() {
            // Делегирование событий с контейнера
            container.addEventListener('click', async (e) => {
                const playBtn = e.target.closest('.play-btn');
                const likeBtn = e.target.closest('.like-btn');
                const waveItem = e.target.closest('.wave-item');

                if (!waveItem) return;

                const trackId = waveItem.dataset.id;

                if (playBtn) {
                    e.stopPropagation();
                    const player = window.player;
                    if (player) player.loadTrack(trackId);
                } else if (likeBtn) {
                    e.stopPropagation();
                    await toggleLike(trackId, likeBtn);
                } else {
                    // Клик по строке – переход на страницу трека
                    window.location.href = `/frontend/track.html?id=${trackId}`;
                }
            });
        }

        // Запуск
        loadWave();
    </script>
</body>
</html>
