<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Поиск</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .search-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .search-header {
            margin-bottom: 32px;
        }
        .search-query {
            font-size: 28px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .search-query span {
            color: var(--accent);
        }
        /* Стили для повторного поиска */
        .search-again {
            display: flex;
            align-items: center;
            gap: 0;
            width: 100%;
            max-width: 600px;
            margin: 0 auto 32px auto;
            background: var(--bg-card);
            border-radius: 30px;
            padding: 0 20px;
        }
        .search-again .input {
            background: transparent;
            border: none;
            padding-left: 12px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            width: 100%;
        }
        .search-again .input::placeholder {
            color: var(--text-secondary);
        }
        .search-again .search-icon {
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .search-again .search-icon:hover {
            color: var(--accent);
        }
        .results-section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        .result-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
        }
        .result-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .result-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .result-icon {
            font-size: 24px;
            margin-right: 16px;
            width: 32px;
            text-align: center;
        }
        .result-info {
            flex: 1;
        }
        .result-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .result-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .result-extra {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 16px;
        }
        .empty-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .error-message {
            text-align: center;
            padding: 40px;
            color: #ff5c5c;
        }
    </style>
</head>
<body>
    <!-- Хедер -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>

    <main class="search-page">
        <div class="search-header">
            <h1 class="search-query">Поиск: <span id="query-text"></span></h1>
            <!-- Новая строка поиска -->
            <div class="search-again">
                <span class="search-icon" id="search-again-icon">🔍</span>
                <input type="text" class="input" placeholder="Искать снова..." id="search-again-input">
            </div>
        </div>
        <div id="results-container"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>

    <!-- Инициализация структуры плеера -->
    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
        })();
    </script>

    <style>
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--bg-card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px; display: flex; align-items: center; gap: 24px;
            z-index: 1000; box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { api } from './js/api.js';
        import { formatTime } from './js/utils.js';
        import { player } from './js/player.js';

        const params = new URLSearchParams(window.location.search);
        const query = params.get('q')?.trim() || '';
        document.getElementById('query-text').textContent = query || '(пустой запрос)';
        const container = document.getElementById('results-container');
        const errorEl = document.getElementById('error-message');

        // Обработка повторного поиска
        const searchAgainInput = document.getElementById('search-again-input');
        const searchAgainIcon = document.getElementById('search-again-icon');

        function doSearch(newQuery) {
            if (!newQuery.trim()) return;
            window.location.href = `/frontend/search.html?q=${encodeURIComponent(newQuery.trim())}`;
        }

        searchAgainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                doSearch(e.target.value);
            }
        });
        searchAgainIcon.addEventListener('click', () => {
            doSearch(searchAgainInput.value);
        });

        // Хедер
        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
        }

        async function performSearch() {
            if (!query) {
                container.innerHTML = '<div class="empty-results">Введите поисковый запрос</div>';
                return;
            }
            try {
                const [tracks, albums, artists] = await Promise.all([
                    api.get(`/tracks?q=${encodeURIComponent(query)}`),
                    api.get(`/albums?q=${encodeURIComponent(query)}`),
                    api.get(`/artists?q=${encodeURIComponent(query)}`)
                ]);
                renderResults(tracks, albums, artists);
            } catch (e) {
                console.error(e);
                errorEl.style.display = 'block';
                errorEl.textContent = 'Ошибка загрузки результатов поиска';
            }
        }

        function renderResults(tracks, albums, artists) {
            let html = '';

            // Треки
            if (tracks.length) {
                html += '<div class="results-section"><h2 class="section-title">Треки</h2><div class="result-list">';
                tracks.forEach(t => {
                    const artistsStr = t.artists?.map(a => a.name).join(', ') || 'Неизвестный исполнитель';
                    const duration = t.duration ? formatTime(t.duration) : '—';
                    html += `
                        <a href="/frontend/track.html?id=${t.id}" class="result-item">
                            <div class="result-icon">🎵</div>
                            <div class="result-info">
                                <div class="result-name">${t.name}</div>
                                <div class="result-subtitle">${artistsStr}</div>
                            </div>
                            <div class="result-extra">${duration}</div>
                        </a>`;
                });
                html += '</div></div>';
            }

            // Альбомы
            if (albums.length) {
                html += '<div class="results-section"><h2 class="section-title">Альбомы</h2><div class="result-list">';
                albums.forEach(a => {
                    const artistsStr = a.artists?.map(ar => ar.name).join(', ') || 'Разные исполнители';
                    html += `
                        <a href="/frontend/album.html?id=${a.id}" class="result-item">
                            <div class="result-icon">💿</div>
                            <div class="result-info">
                                <div class="result-name">${a.name}</div>
                                <div class="result-subtitle">${artistsStr}</div>
                            </div>
                            <div class="result-extra">${a.release_date || ''}</div>
                        </a>`;
                });
                html += '</div></div>';
            }

            // Артисты
            if (artists.length) {
                html += '<div class="results-section"><h2 class="section-title">Артисты</h2><div class="result-list">';
                artists.forEach(ar => {
                    html += `
                        <a href="/frontend/artist.html?id=${ar.id}" class="result-item">
                            <div class="result-icon">🎤</div>
                            <div class="result-info">
                                <div class="result-name">${ar.name}</div>
                            </div>
                        </a>`;
                });
                html += '</div></div>';
            }

            if (!html) {
                container.innerHTML = '<div class="empty-results">Ничего не найдено по запросу «' + query + '»</div>';
            } else {
                container.innerHTML = html;
            }
        }

        updateHeader();
        performSearch();
    </script>
</body>
</html>
