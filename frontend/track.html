<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U:V · Трек</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        /* Стили без изменений */
        .track-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        .track-header {
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }
        .track-cover {
            width: 250px;
            height: 250px;
            border-radius: var(--radius-lg);
            background: var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .track-artists {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 16px;
        }
        .track-artists a {
            color: var(--accent);
            text-decoration: none;
        }
        .track-artists a:hover {
            text-decoration: underline;
        }
        .track-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin: 16px 0;
            color: var(--text-secondary);
            font-size: 16px;
        }
        .track-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .track-actions {
            display: flex;
            gap: 12px;
            margin: 24px 0;
        }
        .track-albums {
            margin-top: 16px;
        }
        .track-albums h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .album-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 16px;
            display: inline-block;
            margin-right: 12px;
        }
        .album-link:hover {
            text-decoration: underline;
        }
        .similar-section {
            margin-top: 48px;
        }
        .similar-section h2 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .similar-list {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 8px 0;
        }
        .similar-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            transition: background 0.2s;
            cursor: pointer;
        }
        .similar-item:hover {
            background: rgba(138, 92, 255, 0.08);
        }
        .similar-uv {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--accent);
            min-width: 80px;
            margin-right: 16px;
        }
        .similar-info {
            flex: 1;
        }
        .similar-track-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        .similar-track-artists {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .similar-play-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
        }
        .similar-play-btn:hover {
            color: var(--accent);
            background: rgba(138, 92, 255, 0.1);
        }
        .empty-similar {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <!-- Хедер -->
    <header class="header" style="display: flex; justify-content: space-between; align-items: center; padding: 24px 32px;">
        <a href="/frontend/index.html" class="logo" style="font-size: 28px; font-weight: 600; color: var(--text-primary); text-decoration: none;">
            U<span style="color: var(--accent);">:</span>V
        </a>
        <div class="header-actions">
            <a href="/frontend/login.html" class="btn" id="login-btn" style="display: none;">Войти</a>
            <div class="avatar" id="user-avatar" style="display: none; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-card);"></div>
        </div>
    </header>

    <main class="track-page">
        <div id="track-content"></div>
        <div id="error-message" class="error-message" style="display: none;"></div>

        <section class="similar-section" id="similar-section" style="display: none;">
            <h2>Похожие треки</h2>
            <div class="similar-list" id="similar-list"></div>
            <div id="similar-loading" class="empty-similar" style="display: none;">Поиск совпадений...</div>
            <div id="similar-error" class="empty-similar" style="display: none;">Не удалось загрузить похожие треки</div>
        </section>
    </main>

    <!-- Глобальный плеер -->
    <div id="player-bar" class="player-bar" style="display: none;"></div>

    <!-- Скрипт инициализации структуры плеера -->
    <script>
        (function createPlayerDOM() {
            const bar = document.getElementById('player-bar');
            bar.innerHTML = `
                <img id="player-cover" class="player-cover" src="https://via.placeholder.com/64/16112A/A8A0C0" alt="cover">
                <div class="player-info">
                    <div id="player-track-name" class="player-track-link">Не выбран трек</div>
                    <div id="player-artist-name" class="player-artist-name"></div>
                </div>
                <div class="player-controls">
                    <button id="player-play" class="player-btn">▶</button>
                    <button id="player-next" class="player-btn">⏭</button>
                </div>
                <div class="player-progress-container">
                    <span id="player-current-time" class="player-time">0:00</span>
                    <input type="range" id="player-progress" class="player-progress" min="0" max="100" value="0">
                    <span id="player-duration" class="player-time">0:00</span>
                </div>
                <div class="player-actions">
                    <button id="player-like" class="player-btn">❤️</button>
                    <button id="player-wave" class="player-btn">🌊</button>
                    <button id="player-expand" class="player-btn">⤢</button>
                </div>
            `;
        })();
    </script>

    <!-- Стили плеера -->
    <style>
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: var(--bg-card);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }
        .player-cover { width: 64px; height: 64px; border-radius: var(--radius-md); object-fit: cover; }
        .player-info { flex: 1; min-width: 200px; }
        .player-track-name { font-size: 18px; font-weight: 500; }
        .player-artist-name { font-size: 14px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 16px; }
        .player-progress-container { display: flex; align-items: center; gap: 12px; width: 400px; }
        .player-progress {
            flex: 1; height: 4px; background: rgba(168,160,192,0.3); border-radius: 2px;
            -webkit-appearance: none; appearance: none;
        }
        .player-progress::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }
        .player-time { font-size: 14px; color: var(--text-secondary); min-width: 40px; }
        .player-actions { display: flex; gap: 16px; margin-left: auto; }
        .player-btn {
            background: none; border: none; color: var(--text-secondary); font-size: 24px;
            cursor: pointer; transition: var(--transition); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%;
        }
        .player-btn:hover { color: var(--accent); background: rgba(138, 92, 255, 0.1); }
        .player-btn.liked { color: var(--accent); }
    </style>

    <script type="module">
        import { isAuthenticated, getCurrentUser } from './js/auth.js';
        import { player } from './js/player.js';
        import { api } from './js/api.js';
        import { formatTime, generateCoverPlaceholder } from './js/utils.js';

        const params = new URLSearchParams(window.location.search);
        const trackId = params.get('id');
        const contentDiv = document.getElementById('track-content');
        const errorDiv = document.getElementById('error-message');
        const similarSection = document.getElementById('similar-section');
        const similarList = document.getElementById('similar-list');
        const similarLoading = document.getElementById('similar-loading');
        const similarError = document.getElementById('similar-error');

        // --- Хедер ---
        async function updateHeader() {
            const loginBtn = document.getElementById('login-btn');
            const avatar = document.getElementById('user-avatar');
            if (isAuthenticated()) {
                const user = await getCurrentUser();
                if (user) {
                    loginBtn.style.display = 'none';
                    avatar.style.display = 'flex';
                    avatar.textContent = user.username.charAt(0).toUpperCase();
                    avatar.addEventListener('click', () => window.location.href = '/frontend/profile.html');
                } else {
                    localStorage.removeItem('access_token');
                    loginBtn.style.display = 'inline-flex';
                    avatar.style.display = 'none';
                }
            } else {
                loginBtn.style.display = 'inline-flex';
                avatar.style.display = 'none';
            }
        }

        // --- Загрузка трека ---
        async function loadTrackDetails() {
            if (!trackId) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Не указан ID трека';
                return;
            }
            try {
                const track = await api.get(`/tracks/${trackId}`);
                // Проверяем, лайкнут ли трек текущим пользователем
                let isLiked = false;
                if (isAuthenticated()) {
                    try {
                        const data = await api.get('/users/me/favorites/ids');
                        if (data && data.track_ids) {
                            isLiked = data.track_ids.some(id => id === trackId);
                        }
                    } catch (e) {
                        // если не авторизован или ошибка — остаётся false
                        console.warn('Не удалось проверить избранное', e);
                    }
                }
                renderTrack(track, isLiked);
                loadSimilarTracks(trackId);
            } catch (e) {
                console.error(e);
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Трек не найден';
            }
        }

        function renderTrack(track, isLiked = false) {
            const artists = track.artists || [];
            const albums = track.albums || [];
            const coverSrc = generateCoverPlaceholder(`${track.name}${track.id}`, 250);
            const likeBtnText = isLiked ? '❤️ Убрать лайк' : '❤️ Нравится';

            const artistsLinks = artists.map(a => 
                `<a href="/frontend/artist.html?id=${a.id}">${a.name}</a>`
            ).join(', ');

            const albumsLinks = albums.map(a => 
                `<a href="/frontend/album.html?id=${a.id}" class="album-link">${a.name}</a>`
            ).join('');

            const html = `
                <div class="track-header">
                    <img class="track-cover" src="${coverSrc}" alt="${track.name}">
                    <div class="track-info">
                        <h1 class="track-name">${track.name}</h1>
                        <div class="track-artists">${artistsLinks || 'Неизвестный исполнитель'}</div>
                        <div class="track-meta">
                            <span>📅 ${track.release_date}</span>
                            <span>⏱ ${formatTime(track.duration)}</span>
                            <span id="track-likes">❤️ ${track.likes}</span>
                            <span id="track-plays">▶ ${track.plays}</span>
                        </div>
                        <div class="track-actions">
                            <button class="btn btn-accent" id="play-track-btn">▶ Воспроизвести</button>
                            <button class="btn" id="like-track-btn">${likeBtnText}</button>
                            <button class="btn" id="wave-track-btn">🌊 Похожие</button>
                        </div>
                        ${albumsLinks ? `<div class="track-albums"><h3>Альбомы</h3>${albumsLinks}</div>` : ''}
                    </div>
                </div>
            `;
            contentDiv.innerHTML = html;

            // Обработчики
            document.getElementById('play-track-btn').addEventListener('click', () => {
                player.loadTrack(track.id);
                // Увеличиваем счётчик прослушиваний на странице
                const playsSpan = document.getElementById('track-plays');
                if (playsSpan) {
                    const current = parseInt(playsSpan.textContent.match(/\d+/)?.[0] || track.plays);
                    playsSpan.textContent = `▶ ${current + 1}`;
                }
            });

            document.getElementById('like-track-btn').addEventListener('click', async () => {
                const likeBtn = document.getElementById('like-track-btn');
                const likesSpan = document.getElementById('track-likes');
                try {
                    await api.post(`/tracks/${track.id}/like`);
                    likeBtn.textContent = '❤️ Убрать лайк';
                    const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || track.likes);
                    likesSpan.textContent = `❤️ ${current + 1}`;
                } catch (e) {
                    if (e.message.includes('already')) {
                        await api.delete(`/tracks/${track.id}/like`);
                        likeBtn.textContent = '❤️ Нравится';
                        const current = parseInt(likesSpan.textContent.match(/\d+/)?.[0] || track.likes);
                        likesSpan.textContent = `❤️ ${Math.max(0, current - 1)}`;
                    }
                }
            });

            document.getElementById('wave-track-btn').addEventListener('click', () => {
                similarSection.scrollIntoView({ behavior: 'smooth' });
            });
        }

        // --- Похожие треки ---
        async function loadSimilarTracks(id) {
            similarSection.style.display = 'block';
            similarLoading.style.display = 'block';
            similarList.innerHTML = '';
            try {
                const similar = await api.get(`/tracks/${id}/similar?limit=10`);
                similarLoading.style.display = 'none';
                if (!similar.length) {
                    similarList.innerHTML = '<div class="empty-similar">Совпадений не найдено</div>';
                    return;
                }
                similarList.innerHTML = similar.map(t => {
                    const artistsStr = (t.artists || []).map(a => a.name).join(', ');
                    const uv = t.similarity ? Math.round(t.similarity) : '—';
                    return `
                        <div class="similar-item" data-id="${t.id}">
                            <div class="similar-uv">UV ${uv}</div>
                            <div class="similar-info">
                                <div class="similar-track-name">${t.name}</div>
                                <div class="similar-track-artists">${artistsStr}</div>
                            </div>
                            <button class="similar-play-btn" title="Воспроизвести">▶</button>
                        </div>
                    `;
                }).join('');

                document.querySelectorAll('.similar-item').forEach(item => {
                    const playBtn = item.querySelector('.similar-play-btn');
                    const trackId = item.dataset.id;
                    item.addEventListener('click', (e) => {
                        if (e.target === playBtn || playBtn.contains(e.target)) return;
                        window.location.href = `/frontend/track.html?id=${trackId}`;
                    });
                    playBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        player.loadTrack(trackId);
                    });
                });
            } catch (e) {
                console.error(e);
                similarLoading.style.display = 'none';
                similarError.style.display = 'block';
            }
        }

        // --- Старт ---
        updateHeader();
        loadTrackDetails();

        window.player = player;
    </script>
</body>
</html>
